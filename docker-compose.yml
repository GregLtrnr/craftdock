services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: craftdock
      POSTGRES_PASSWORD: craftdock
      POSTGRES_DB: craftdock
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craftdock"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://craftdock:craftdock@postgres:5432/craftdock
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-session}
      CSRF_SECRET: ${CSRF_SECRET:-change-me-csrf}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DATA_DIR: /var/lib/craftdock/servers
      BACKUP_DIR: /var/lib/craftdock/backups
      JAVA_HOME: /opt/java-home
      CURSEFORGE_API_KEY: ${CURSEFORGE_API_KEY:-}
      DOCKER_ENABLED: "true"
    volumes:
      - craftdock_data:/var/lib/craftdock
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4000:4000"

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    profiles:
      - production

volumes:
  postgres_data:
  craftdock_data:

networks:
  default:
    name: craftdock-net
